name: Iqx CI/CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci


      - name: Create .env file safely
        run: |
          rm -f .env
          printf "%s" "${{ secrets.PROD_ENV_FILE }}" > .env
          chmod 600 .env

      - name: run iqx backend
        run: npm run build

      - name: Add Node & PM2 to PATH
        run: echo "/home/nodeteam/.local/share/fnm/node-versions/v22.21.1/installation/bin" >> $GITHUB_PATH

      - name: Restart backend with PM2
        run: |
          pm2 delete iqx-backend || true
          pm2 start dist/main.js --name iqx-backend
          pm2 save
